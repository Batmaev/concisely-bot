services:
  bot:
    build: .
    container_name: concisely-bot
    env_file:
      - .env
    environment:
      - WIDE_LOG_DIR=/app/logs
      - DB_PATH=/data
    volumes:
      - ./src-ts:/app/src-ts
      - ./logs:/app/logs
      - ./data:/data
    restart: unless-stopped

  log-archiver:
    build:
      context: .
      dockerfile: Dockerfile.archiver
    container_name: concisely-log-archiver
    environment:
      - WIDE_LOG_DIR=/logs
      - KEEP_DAYS=3
    volumes:
      - ./logs:/logs
    restart: unless-stopped
